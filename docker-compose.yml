services:
  # Messaging Backbone
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.1
    command:
      - redpanda start
      - --smp 1
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"

  # Visualizer for Redpanda
  console:
    image: docker.redpanda.com/redpandadata/console:v2.3.1
    entrypoint: /bin/sh
    command: -c "echo \"$$CONSOLE_CONFIG_FILE\" > /tmp/config.yml; /app/console"
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:9092"]
    ports:
      - "8080:8080"
    depends_on:
      - redpanda

  # Monitoring Stack
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - redpanda
      - heartbeat-worker
      - clickhouse

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

  # Node.js Consumer Worker
  heartbeat-worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
      - KAFKA_TOPIC=heartbeats
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=password123
      - BATCH_SIZE=1000
    depends_on:
      - redpanda
      - clickhouse
    ports:
      - "9091:9091" # Metrics port

  # Time-Series Storage
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=password123
    volumes:
      - ./clickhouse/prometheus.xml:/etc/clickhouse-server/config.d/prometheus.xml
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # FastAPI Ingestion API
  ingestion-api:
    build:
      context: .
      dockerfile: apps/ingestion-api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
      - KAFKA_TOPIC=heartbeats
      - KAFKA_CLIENT_ID=ingestion-api-docker
      - PROMETHEUS_MULTIPROC_DIR=/tmp
    depends_on:
      - redpanda