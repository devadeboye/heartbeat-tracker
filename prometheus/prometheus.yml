global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'redpanda'
    static_configs:
      - targets: ['redpanda:9644']

  - job_name: 'clickhouse'
    static_configs:
      - targets: ['clickhouse:9363']

  - job_name: 'heartbeat-worker'
    static_configs:
      - targets: ['heartbeat-worker:9091']

  - job_name: 'ingestion-api'
    static_configs:
      - targets: ['ingestion-api:8000']
